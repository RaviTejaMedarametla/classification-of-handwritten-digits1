name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies (reproducible)
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
          PYTHONHASHSEED: "40"
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt

      - name: Unit tests
        env:
          PYTHONHASHSEED: "40"
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Smoke training
        env:
          PYTHONHASHSEED: "40"
        run: python -m research.train_cli --model knn --dataset digits --seed 40

      - name: Compression benchmark smoke
        env:
          PYTHONHASHSEED: "40"
        run: python -m research.evaluate_cli --model rf --dataset digits --seed 40 --runs 2 --run-model-compression --run-operator-profile

      - name: ONNX parity check
        env:
          PYTHONHASHSEED: "40"
        run: python -m research.infer_cli --model knn --dataset digits --seed 40 --export-onnx --onnx-min-agreement 0.98
